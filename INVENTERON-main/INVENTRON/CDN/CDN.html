<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Dashboard</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #eef1f7;
}

/* Navbar */
.navbar {
    background: #2c3e50;
}

.navbar-brand {
    font-weight: 600;
}

/* Cards */
.card {
    border-radius: 12px;
    border: none;
}

/* Stats */
.stat-card {
    padding: 20px;
    text-align: center;
}

.stat-card h5 {
    margin-top: 10px;
}

/* Table */
.table td, .table th {
    vertical-align: middle;
}

/* Buttons */
.btn {
    border-radius: 8px;
}
</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">
      <i class="bi bi-speedometer2"></i> DevDashboard
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Activity</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
      </ul>

      <button class="btn btn-success me-2">
        <i class="bi bi-plus-circle"></i> New Project
      </button>

      <button class="btn btn-outline-light">
        Login
      </button>
    </div>

  </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">

  <!-- Stats Row -->
  <div class="row g-3">

    <div class="col-md-4">
      <div class="card shadow stat-card">
        <i class="bi bi-folder-fill fs-2 text-primary"></i>
        <h5>Total Projects</h5>
        <h3>12</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow stat-card">
        <i class="bi bi-check-circle-fill fs-2 text-success"></i>
        <h5>Completed</h5>
        <h3>5</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow stat-card">
        <i class="bi bi-clock-fill fs-2 text-warning"></i>
        <h5>In Progress</h5>
        <h3>7</h3>
      </div>
    </div>

  </div>

  <!-- Projects Table -->
  <div class="card shadow mt-4 p-3">

    <div class="d-flex justify-content-between mb-3">
      <h5>Project List</h5>
      <input type="text" class="form-control w-25" placeholder="Search...">
    </div>

    <table class="table table-hover">
      <thead class="table-light">
        <tr>
          <th>Project</th>
          <th>Status</th>
          <th>Last Updated</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td><i class="bi bi-folder"></i> Portfolio Website</td>
          <td><span class="badge bg-success">Completed</span></td>
          <td>2 days ago</td>
          <td>
            <button class="btn btn-sm btn-primary">View</button>
            <button class="btn btn-sm btn-outline-danger">Delete</button>
          </td>
        </tr>

        <tr>
          <td><i class="bi bi-folder"></i> E-commerce App</td>
          <td><span class="badge bg-warning text-dark">In Progress</span></td>
          <td>5 days ago</td>
          <td>
            <button class="btn btn-sm btn-primary">View</button>
            <button class="btn btn-sm btn-outline-danger">Delete</button>
          </td>
        </tr>

        <tr>
          <td><i class="bi bi-folder"></i> Chat Application</td>
          <td><span class="badge bg-danger">Paused</span></td>
          <td>1 week ago</td>
          <td>
            <button class="btn btn-sm btn-primary">View</button>
            <button class="btn btn-sm btn-outline-danger">Delete</button>
          </td>
        </tr>

      </tbody>
    </table>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
